apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-stack-backend
  labels:
    app: genai-stack
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: genai-stack
      component: backend
  template:
    metadata:
      labels:
        app: genai-stack
        component: backend
    spec:
      containers:
      - name: backend
        image: genai-stack-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: genai-stack-secrets
              key: supabase-url
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: genai-stack-secrets
              key: supabase-anon-key
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: genai-stack-secrets
              key: groq-api-key
        - name: SERPAPI_KEY
          valueFrom:
            secretKeyRef:
              name: genai-stack-secrets
              key: serpapi-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: genai-stack-backend
spec:
  selector:
    app: genai-stack
    component: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
